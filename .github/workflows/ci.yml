name: CI
on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: 'string'
      jdk:
        default: 8
        type: 'string'
      os:
        default: ubuntu-latest
        type: 'string'
      profile:
        default: ''
        type: 'string'
jobs:
  Test:
    name: Run tests
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          ref: ${{ inputs.branch }}
      - name: Install JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.jdk }}
          distribution: temurin
      - name: Run tests
        run: |
          # Raise memlock to 16M (for io_uring testing)
          sudo prlimit --pid $$ --memlock=16777216:16777216
          # Verify the change
          ulimit -l
          mvn -s .github/maven-ci-settings.xml -q clean verify -B ${{ inputs.profile }}
